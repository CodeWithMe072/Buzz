<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer - Chat Interface</title>
    <style>
      

        .media-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .media-thumbnail:hover {
            transform: scale(1.05);
        }

        .video-thumbnail {
            position: relative;
        }

        .video-thumbnail::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            pointer-events: none;
        }

        /* Media Viewer Overlay */
        .media-viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .media-viewer-overlay.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        /* Header */
        .viewer-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .viewer-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sender-name {
            font-weight: 600;
        }

        .media-counter {
            color: #aaa;
            font-size: 14px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }

        /* Main Viewer Area */
        .viewer-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }

        .media-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .media-slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .media-slide img,
        .media-slide video {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            font-size: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-arrow.left {
            left: 20px;
        }

        .nav-arrow.right {
            right: 20px;
        }

        .nav-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Thumbnail Strip */
        .thumbnail-strip {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            overflow-x: auto;
            overflow-y: hidden;
        }

        .thumbnail-container {
            display: flex;
            gap: 10px;
            min-width: min-content;
        }

        .thumbnail-item {
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            position: relative;
        }

        .thumbnail-item.active {
            border-color: #25d366;
        }

        .thumbnail-item img,
        .thumbnail-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-item.video::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            pointer-events: none;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .chat-container {
                padding: 10px;
            }

            .message-content {
                max-width: 85%;
            }

            .nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 24px;
                display: none; /* Hide on mobile, use swipe instead */
            }

            .viewer-header {
                padding: 10px 15px;
            }

            .thumbnail-strip {
                padding: 10px 15px;
            }

            .thumbnail-item {
                width: 50px;
                height: 50px;
            }
        }

        /* Scrollbar styling */
        .thumbnail-strip::-webkit-scrollbar {
            height: 6px;
        }

        .thumbnail-strip::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .thumbnail-strip::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Media Viewer Overlay -->
    <div class="media-viewer-overlay" id="mediaViewer">
        <div class="viewer-header">
            <div class="viewer-info">
                <span class="sender-name">Ammi😊</span>
                <span class="media-counter">
                    <span id="currentIndex">1</span> of <span id="totalMedia">7</span>
                </span>
            </div>
            <button class="close-btn" id="closeViewer">×</button>
        </div>

        <div class="viewer-main" id="viewerMain">
            <button class="nav-arrow left" id="prevBtn">‹</button>
            <div class="media-container" id="mediaContainer">
                <!-- Media slides will be dynamically inserted here -->
            </div>
            <button class="nav-arrow right" id="nextBtn">›</button>
        </div>

        <div class="thumbnail-strip">
            <div class="thumbnail-container" id="thumbnailContainer">
                <!-- Thumbnails will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script>
        class MediaViewer {
            constructor() {
                this.mediaItems = [];
                this.currentIndex = 0;
                this.overlay = document.getElementById('mediaViewer');
                this.container = document.getElementById('mediaContainer');
                this.thumbnailContainer = document.getElementById('thumbnailContainer');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.closeBtn = document.getElementById('closeViewer');
                this.viewerMain = document.getElementById('viewerMain');
                
                // Touch/swipe variables
                this.touchStartX = 0;
                this.touchEndX = 0;
                this.isDragging = false;
                
                this.init();
            }

            init() {
                // Collect all media items
                this.collectMediaItems();
                
                // Event listeners
                this.closeBtn.addEventListener('click', () => this.close());
                this.prevBtn.addEventListener('click', () => this.navigate(-1));
                this.nextBtn.addEventListener('click', () => this.navigate(1));
                
                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (!this.overlay.classList.contains('active')) return;
                    
                    if (e.key === 'ArrowLeft') this.navigate(-1);
                    if (e.key === 'ArrowRight') this.navigate(1);
                    if (e.key === 'Escape') this.close();
                });
                
                // Touch events for swipe
                this.viewerMain.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: true });
                this.viewerMain.addEventListener('touchmove', (e) => this.handleTouchMove(e), { passive: true });
                this.viewerMain.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: true });
                
                // Mouse events for desktop drag (optional)
                this.viewerMain.addEventListener('mousedown', (e) => this.handleMouseDown(e));
                this.viewerMain.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.viewerMain.addEventListener('mouseup', (e) => this.handleMouseUp(e));
                this.viewerMain.addEventListener('mouseleave', (e) => this.handleMouseUp(e));
            }

            collectMediaItems() {
                const allThumbnails = document.querySelectorAll('.media-thumbnail');
                
                allThumbnails.forEach((thumb, index) => {
                    const mediaType = thumb.dataset.mediaType;
                    const src = mediaType === 'video' ? thumb.querySelector('source')?.src || thumb.src : thumb.src;
                    
                    this.mediaItems.push({
                        type: mediaType,
                        src: src,
                        element: thumb
                    });
                    
                    // Add click event to open viewer
                    thumb.addEventListener('click', () => {
                        this.open(index);
                    });
                });
            }

            open(index) {
                this.currentIndex = index;
                this.overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                this.render();
            }

            close() {
                this.overlay.classList.remove('active');
                document.body.style.overflow = '';
                
                // Pause all videos
                this.container.querySelectorAll('video').forEach(video => {
                    video.pause();
                });
            }

            navigate(direction) {
                const newIndex = this.currentIndex + direction;
                
                if (newIndex >= 0 && newIndex < this.mediaItems.length) {
                    this.currentIndex = newIndex;
                    this.updateMedia();
                }
            }

            render() {
                // Clear existing content
                this.container.innerHTML = '';
                this.thumbnailContainer.innerHTML = '';
                
                // Create slides
                this.mediaItems.forEach((item, index) => {
                    // Create slide
                    const slide = document.createElement('div');
                    slide.className = 'media-slide';
                    if (index === this.currentIndex) {
                        slide.classList.add('active');
                    }
                    
                    if (item.type === 'video') {
                        const video = document.createElement('video');
                        video.src = item.src;
                        video.controls = true;
                        video.autoplay = index === this.currentIndex;
                        slide.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = `Media ${index + 1}`;
                        slide.appendChild(img);
                    }
                    
                    this.container.appendChild(slide);
                    
                    // Create thumbnail
                    const thumbItem = document.createElement('div');
                    thumbItem.className = 'thumbnail-item';
                    if (item.type === 'video') {
                        thumbItem.classList.add('video');
                    }
                    if (index === this.currentIndex) {
                        thumbItem.classList.add('active');
                    }
                    
                    if (item.type === 'video') {
                        const thumbVideo = document.createElement('video');
                        thumbVideo.src = item.src;
                        thumbVideo.muted = true;
                        thumbItem.appendChild(thumbVideo);
                    } else {
                        const thumbImg = document.createElement('img');
                        thumbImg.src = item.src;
                        thumbImg.alt = `Thumbnail ${index + 1}`;
                        thumbItem.appendChild(thumbImg);
                    }
                    
                    thumbItem.addEventListener('click', () => {
                        this.currentIndex = index;
                        this.updateMedia();
                    });
                    
                    this.thumbnailContainer.appendChild(thumbItem);
                });
                
                this.updateControls();
            }

            updateMedia() {
                // Update slides
                const slides = this.container.querySelectorAll('.media-slide');
                slides.forEach((slide, index) => {
                    if (index === this.currentIndex) {
                        slide.classList.add('active');
                        const video = slide.querySelector('video');
                        if (video) video.play();
                    } else {
                        slide.classList.remove('active');
                        const video = slide.querySelector('video');
                        if (video) video.pause();
                    }
                });
                
                // Update thumbnails
                const thumbs = this.thumbnailContainer.querySelectorAll('.thumbnail-item');
                thumbs.forEach((thumb, index) => {
                    if (index === this.currentIndex) {
                        thumb.classList.add('active');
                        thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        thumb.classList.remove('active');
                    }
                });
                
                this.updateControls();
            }

            updateControls() {
                // Update counter
                document.getElementById('currentIndex').textContent = this.currentIndex + 1;
                document.getElementById('totalMedia').textContent = this.mediaItems.length;
                
                // Update navigation buttons
                this.prevBtn.disabled = this.currentIndex === 0;
                this.nextBtn.disabled = this.currentIndex === this.mediaItems.length - 1;
            }

            // Touch handlers
            handleTouchStart(e) {
                this.touchStartX = e.changedTouches[0].screenX;
            }

            handleTouchMove(e) {
                this.touchEndX = e.changedTouches[0].screenX;
            }

            handleTouchEnd(e) {
                const swipeThreshold = 50;
                const diff = this.touchStartX - this.touchEndX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        // Swipe left - next
                        this.navigate(1);
                    } else {
                        // Swipe right - previous
                        this.navigate(-1);
                    }
                }
            }

            // Mouse drag handlers (optional for desktop)
            handleMouseDown(e) {
                this.isDragging = true;
                this.touchStartX = e.clientX;
            }

            handleMouseMove(e) {
                if (!this.isDragging) return;
                this.touchEndX = e.clientX;
            }

            handleMouseUp(e) {
                if (!this.isDragging) return;
                this.isDragging = false;
                
                const swipeThreshold = 50;
                const diff = this.touchStartX - this.touchEndX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) {
                        this.navigate(1);
                    } else {
                        this.navigate(-1);
                    }
                }
            }
        }

        // Initialize the media viewer
        const viewer = new MediaViewer();
    </script>
</body>
</html>
